<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance - Eglux</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 900px;
            width: 100%;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: #d4af37;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 80px;
        }

        .main-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 700;
            color: #1a1a1a;
            line-height: 1.1;
            letter-spacing: -2px;
            margin-bottom: 40px;
        }

        .sub-text {
            font-size: 1rem;
            font-weight: 400;
            color: #888888;
            line-height: 1.8;
            max-width: 500px;
            margin: 0 auto 60px;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: #d4af37;
            margin: 0 auto 60px;
        }

        .contact-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .contact-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border: 1px solid #e0e0e0;
            border-radius: 50px;
            color: #555555;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            transition: all 0.3s ease;
            background: #ffffff;
        }

        .contact-link:hover {
            border-color: #d4af37;
            color: #d4af37;
            background: #faf8f3;
        }

        .contact-link svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .footer {
            margin-top: 80px;
            font-size: 0.7rem;
            color: #bbbbbb;
            letter-spacing: 1px;
        }

        /* Entrance animation */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .fade-in-delay-1 { animation-delay: 0.2s; }
        .fade-in-delay-2 { animation-delay: 0.4s; }
        .fade-in-delay-3 { animation-delay: 0.6s; }
        .fade-in-delay-4 { animation-delay: 0.8s; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .logo { font-size: 1rem; letter-spacing: 4px; margin-bottom: 60px; }
            .sub-text { font-size: 0.9rem; padding: 0 20px; }
            .contact-links { flex-direction: column; align-items: center; }
            .contact-link { width: 100%; max-width: 280px; justify-content: center; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <div class="logo fade-in">Eglux</div>

        <h1 class="main-text fade-in fade-in-delay-1">Still Under<br>Maintenance</h1>

        <div class="divider fade-in fade-in-delay-2"></div>

        <p class="sub-text fade-in fade-in-delay-2">
            We are currently upgrading our website to serve you better.<br>
            Please check back soon.
        </p>
